name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo build
      - run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: databricks-tui-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: databricks-tui-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: databricks-tui-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz databricks-tui
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          mv ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}.tar.gz.sha256 ../../../
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  # Publishes the crate once the release binaries are good. Tolerates
  # re-pushed tags where the version is already on crates.io.
  crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -o pipefail
          # Log outside the workspace — cargo refuses a dirty worktree.
          if ! cargo publish 2>&1 | tee /tmp/publish.log; then
            grep -q "already uploaded" /tmp/publish.log
          fi

  # Bumps the Homebrew formula in pjhamera/homebrew-tap to this release.
  tap:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern '*.sha256'
      - name: Update formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARM=$(cut -d' ' -f1 databricks-tui-macos-arm64.tar.gz.sha256)
          X86=$(cut -d' ' -f1 databricks-tui-macos-x86_64.tar.gz.sha256)
          LINUX=$(cut -d' ' -f1 databricks-tui-linux-x86_64.tar.gz.sha256)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/pjhamera/homebrew-tap.git"
          cat > homebrew-tap/Formula/databricks-tui.rb <<EOF
          class DatabricksTui < Formula
            desc "Terminal dashboard for Databricks"
            homepage "https://github.com/pjhamera/databricks-tui"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/pjhamera/databricks-tui/releases/download/v#{version}/databricks-tui-macos-arm64.tar.gz"
                sha256 "${ARM}"
              else
                url "https://github.com/pjhamera/databricks-tui/releases/download/v#{version}/databricks-tui-macos-x86_64.tar.gz"
                sha256 "${X86}"
              end
            end

            on_linux do
              url "https://github.com/pjhamera/databricks-tui/releases/download/v#{version}/databricks-tui-linux-x86_64.tar.gz"
              sha256 "${LINUX}"
            end

            def install
              bin.install "databricks-tui"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/databricks-tui --version")
            end
          end
          EOF
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/databricks-tui.rb
          # A re-pushed tag can produce an identical formula — that's fine.
          git commit -m "databricks-tui ${VERSION}" || exit 0
          git push
