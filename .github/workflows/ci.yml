name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo build
      - run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: databricks-tui-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: databricks-tui-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: databricks-tui-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz databricks-tui
          mv ${{ matrix.artifact }}.tar.gz ../../../
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz
